<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Event Details | Thailand BL Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f6f6;
            margin: 0;
            padding: 20px;
        }

        a {
            text-decoration: none;
            color: #007BFF;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
        }

        .meta {
            margin: 10px 0;
            color: #444;
        }

        .label {
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            background: #007BFF;
            color: white;
            font-size: 12px;
            margin-left: 6px;
        }

        .ticket {
            background: #28a745;
        }

        .summary {
            margin-top: 15px;
            line-height: 1.6;
        }

        .source {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            word-break: break-word;
        }

        .back {
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- BACK BUTTON -->
    <div class="back">
        <a href="/">⬅ Back to Home</a>
    </div>

    <!-- TITLE -->
    <h1>
        {{ event.company }}

        {% if event.ticket_sale %}
            <span class="badge ticket">🎟 Ticket Sale</span>
        {% endif %}
    </h1>

    <!-- ACTORS -->
    <div class="meta">
        <span class="label">🎭 Actors:</span>
        {{ event.actors }}
    </div>

    <!-- DATE -->
    <div class="meta">
        <span class="label">📆 Date:</span>
        {{ event.event_date }}
    </div>

    <!-- LOCATION -->
    <div class="meta">
        <span class="label">📍 Location:</span>
        {{ event.location }}
    </div>

    <!-- TICKET INFO -->
    <div class="meta">
        <span class="label">🎟 Ticket:</span>
        {{ event.ticket_sale }}
    </div>

    <!-- SUMMARY -->
    <div class="summary">
        <span class="label">📝 Summary:</span><br><br>
        {{ event.summary }}
    </div>

    <!-- URL / SOURCE -->
    <div class="source">
        <span class="label">🔗 Source:</span><br>
        <a href="{{ event.url }}" target="_blank">
            {{ event.url }}
        </a>
    </div>

</div>

</body>
</html>
