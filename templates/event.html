<!DOCTYPE html>
<html>

<head>
    <title>Thailand BL Tracker</title>

    <style>
        body {
            font-family: Arial;
            background: #f7f7f7;
            padding: 20px;
        }

        div {
            background: white;
            border-radius: 10px;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>

</head>

<body>

<a href="/">⬅ Back</a>

<h1>Event Details</h1>

<hr>

<div>

    <h2>{{ event.company }}</h2>

    <p><b>Actors:</b> {{ event.actors }}</p>

    <p><b>Date:</b> {{ event.event_date }}</p>

    <p><b>Location:</b> {{ event.location }}</p>

    <p><b>Ticket:</b> {{ event.ticket_sale }}</p>

    <p><b>Summary:</b> {{ event.summary }}</p>

    <p><b>Source:</b> {{ event.source }}</p>

    {% if event.url %}
        <p><b>URL:</b> <a href="{{ event.url }}" target="_blank">Open Source</a></p>
    {% endif %}

</div>

</body>
</html>
